name: memory-manager
description: 管理 OpenClaw 的长期记忆系统
version: 1.0.0

tools:
  - name: read_memory
    script: scripts/read_memory.py
    description: 读取指定记忆文件
    
  - name: write_memory
    script: scripts/write_memory.py
    description: 写入新记忆
    
  - name: search_memory
    script: scripts/search_memory.py
    description: 搜索记忆
    
  - name: link_memory
    script: scripts/link_memory.py
    description: 发现记忆关联

mcp:
  enabled: true
  server: obsidian
